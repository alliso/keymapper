name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runs-on: macos-14
          - name: windows-amd64
            runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2 pkg-config

      - name: Install SDL2 (Windows, MSYS2/MinGW)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-pkg-config

      - name: Build (macOS)
        if: runner.os == 'macOS'
        env:
          CGO_ENABLED: '1'
        run: go build -trimpath -o dist/keymapper .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: '1'
        run: |
          export PATH="/mingw64/bin:$PATH"
          go build -trimpath -o dist/keymapper.exe .
          cp /mingw64/bin/SDL2.dll dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keymapper-${{ matrix.name }}
          path: dist/
          if-no-files-found: error
